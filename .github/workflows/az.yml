name: Disassemble SPIR-V Shaders

on:
  push:
    branches: [ "glsl" ]           # 当推送到 spv 分支时触发
  pull_request:
    branches: [ "glsl" ]
  workflow_dispatch:               # 允许手动触发

jobs:
  disassemble-spirv:
    name: Disassemble SPIR-V to GLSL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: mipad/1      # 替换为您的仓库（用户名/仓库名）
          ref: glsl                 # 分支名
          path: shaders

      - name: Install spirv-cross
        run: |
          sudo apt-get update
          sudo apt-get install -y spirv-cross
          spirv-cross --version

      - name: Create output directory
        run: mkdir -p glsl_output

      - name: Disassemble SPIR-V files
        run: |
          echo "🔍 Searching for .spv files..."
          find shaders -name "*.spv" -print0 | while IFS= read -r -d '' spv_file; do
            base=$(basename "$spv_file" .spv)
            glsl_file="glsl_output/${base}.glsl"
            echo "⚙️  Disassembling $spv_file -> $glsl_file"
            spirv-cross "$spv_file" --output "$glsl_file" --vulkan-semantics
            if [ $? -eq 0 ]; then
              echo "✅  Success: $glsl_file"
            else
              echo "❌  Failed: $spv_file"
            fi
          done

      - name: List output files
        run: ls -la glsl_output/

      - name: Upload GLSL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glsl-sources
          path: glsl_output/