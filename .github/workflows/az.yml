name: Compile SPIR-V Shaders

on:
  push:
    branches: [ "spv" ]
  pull_request:
    branches: [ "spv" ]

jobs:
  compile-spirv:
    name: Compile GLSL to SPIR-V
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: mipad/1
          ref: spv
          path: 1

      - name: Install glslang-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y glslang-tools
          glslangValidator --version

      - name: Create output directory
        run: mkdir -p spirv_output

      - name: Compile shaders
        run: |
          # 编译计算着色器 (.comp)
          for file in 1/*.comp; do
            if [ -f "$file" ]; then
              base=$(basename "$file" .comp)
              echo "Compiling $file -> spirv_output/${base}.spv"
              glslangValidator -V "$file" -o "spirv_output/${base}.spv"
            fi
          done
          # 可选：编译顶点/片段着色器 (.vert/.frag)
          for ext in vert frag; do
            for file in 1/*.$ext; do
              if [ -f "$file" ]; then
                base=$(basename "$file" .$ext)
                echo "Compiling $file -> spirv_output/${base}.spv"
                glslangValidator -V "$file" -o "spirv_output/${base}.spv"
              fi
            done
          done

      - name: List compiled files
        run: ls -la spirv_output/

      - name: Upload SPIR-V artifacts
        uses: actions/upload-artifact@v4
        with:
          name: spirv-binaries
          path: spirv_output/