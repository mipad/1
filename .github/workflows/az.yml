name: Android CI - Multi Flavor Build

on:
  push:
    branches: [ "2" ]
  pull_request:
    branches: [ "2" ]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      JAVA_OPTS: "-Xmx6g -XX:MaxMetaspaceSize=4g"
      GRADLE_OPTS: "-Dorg.gradle.daemon=false -Dorg.gradle.workers.max=4"
      PROJECT_DIR: src/RyujinxAndroid
      ANDROID_NDK_VERSION: "29.0.14206865"
      DOTNET_VERSION: "10.0.101"
      ANDROID_API_LEVEL: "36"
      GRADLE_VERSION: "9.2.0"
      ANDROID_BUILD_TOOLS: "36.0.0"

    steps:
    # 1. 检出代码
    - name: Checkout code from GitLab
      uses: actions/checkout@v4
      with:
        github-server-url: https://gitlab.com
        repository: mipad1-group/Test-ryu
        ref: v6-优化1
        path: Test-ryu
        token: ${{ secrets.GITLAB_TOKEN }}

    # 2. 环境配置
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21
        architecture: x64

    - name: Setup Android SDK/NDK
      uses: android-actions/setup-android@v3
      with:
        ndk-version: ${{ env.ANDROID_NDK_VERSION }}
        cmake-version: 3.22.1

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    # 3. 缓存
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    # 4. 权限和 Gradle 设置
    - name: Set execution permissions
      working-directory: ${{ github.workspace }}/Test-ryu
      run: |
        find . -name "gradlew" -exec chmod +x {} \;
        find . -name "*.sh" -exec chmod +x {} \;
        find . -name "*.bat" -exec chmod +x {} \; 2>/dev/null || true

    - name: Setup Gradle Wrapper
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Initializing Gradle Wrapper"
          gradle wrapper --gradle-version=${{ env.GRADLE_VERSION }}
        else
          echo "Gradle Wrapper already exists"
        fi

    # 5. 验证环境
    - name: Verify .NET SDK Installation
      run: dotnet --list-sdks

    - name: Install Android SDK Components
      run: |
        $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install \
          "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" \
          "platforms;android-${{ env.ANDROID_API_LEVEL }}" \
          "cmake;3.22.1" \
          "ndk;${{ env.ANDROID_NDK_VERSION }}"

    - name: Configure Environment Paths
      shell: bash
      run: |
        ANDROID_NDK_HOME="/usr/local/lib/android/sdk/ndk/${{ env.ANDROID_NDK_VERSION }}"
        LLVM_PATH="$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
        LIB_DIR="$LLVM_PATH/sysroot/usr/lib/aarch64-linux-android/${{ env.ANDROID_API_LEVEL }}"

        echo "ANDROID_NDK_HOME=$ANDROID_NDK_HOME" >> $GITHUB_ENV
        echo "LLVM_PATH=$LLVM_PATH" >> $GITHUB_ENV
        echo "LIB_DIR=$LIB_DIR" >> $GITHUB_ENV
        echo "$LLVM_PATH/bin" >> $GITHUB_PATH

    - name: Install Ninja Build
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build
        ninja --version

    - name: Validate Build Environment
      run: |
        echo "=== 环境验证 ==="
        java -version
        ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/gradlew --version
        echo "Android SDK路径: $ANDROID_HOME"
        echo "NDK路径: $ANDROID_NDK_HOME"
        echo "LLVM路径: $LLVM_PATH"
        echo "=== 环境验证完成 ==="

    # 6. 主构建流程（构建所有 flavor）
    - name: Build all flavor APKs
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      env:
        OPENSSL_ROOT_DIR: /opt/openssl-x64
      run: |
        echo "LLVM_PATH: $LLVM_PATH"
        echo "OPENSSL_ROOT_DIR: $OPENSSL_ROOT_DIR"
        echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"

        # 构建所有 device flavor 的 release 版本
        ./gradlew assembleRelease \
          -DllvmToolchainPath=$LLVM_PATH \
          -Dopenssl.root=$OPENSSL_ROOT_DIR \
          -Pandroid.overridePathCheck=true \
          --no-daemon \
          --stacktrace \
          --info

    # 7. 检查构建产物
    - name: List generated APKs
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        echo "========== 所有生成的 APK =========="
        find app/build/outputs/apk -name "*.apk" -print
        echo "========== 搜索完成 =========="

    - name: Find Native Libraries (.so)
      working-directory: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}
      run: |
        echo "========== Native 库文件 =========="
        find app/build -name "*.so" -print
        echo "========== 搜索完成 =========="

    # 8. 上传产物（每个 flavor 单独上传）
    - name: Upload APK - armv8
      uses: actions/upload-artifact@v4
      with:
        name: android-armv8-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/armv8/release/*.apk
        retention-days: 7

    - name: Upload APK - armv82
      uses: actions/upload-artifact@v4
      with:
        name: android-armv82-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/armv82/release/*.apk
        retention-days: 7

    - name: Upload APK - armv82_plus
      uses: actions/upload-artifact@v4
      with:
        name: android-armv82_plus-release
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/outputs/apk/armv82_plus/release/*.apk
        retention-days: 7

    # 9. 上传 native 库和构建报告（可选）
    - name: Upload Native Libraries
      uses: actions/upload-artifact@v4
      with:
        name: native-libs
        path: ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/**/*.so
        retention-days: 7

    - name: Upload Build Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: build-reports
        path: |
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/app/build/reports/
          ${{ github.workspace }}/Test-ryu/${{ env.PROJECT_DIR }}/build/reports/
        retention-days: 3
