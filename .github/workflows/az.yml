name: Disassemble SPIR-V Shaders

on:
  push:
    branches: [ "glsl" ]
  pull_request:
    branches: [ "glsl" ]
  workflow_dispatch:

jobs:
  disassemble-spirv:
    name: Disassemble SPIR-V to GLSL
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: mipad/1      # 请替换为您的实际仓库，例如 "YourName/YourRepo"
          ref: glsl
          path: shaders

      # 将 .spv.1 重命名为 .spv
      - name: Rename .spv.1 files to .spv
        run: |
          echo "🔍 Searching for .spv.1 files..."
          find shaders -type f -name "*.spv.1" -print0 | while IFS= read -r -d '' file; do
            newname="${file%.spv.1}.spv"
            echo "📝 Renaming $file -> $newname"
            mv "$file" "$newname"
          done
          echo "✅ Rename completed."

      - name: Install spirv-cross
        run: |
          sudo apt-get update
          sudo apt-get install -y spirv-cross

      - name: Create output directory
        run: mkdir -p glsl_output

      - name: Disassemble SPIR-V files
        run: |
          echo "🔍 Searching for .spv files..."
          find shaders -name "*.spv" -print0 | while IFS= read -r -d '' spv_file; do
            base=$(basename "$spv_file" .spv)
            glsl_file="glsl_output/${base}.glsl"
            echo "⚙️  Disassembling $spv_file -> $glsl_file"
            spirv-cross "$spv_file" --output "$glsl_file" --vulkan-semantics
            if [ $? -eq 0 ]; then
              echo "✅  Success: $glsl_file"
            else
              echo "❌  Failed: $spv_file"
            fi
          done

      - name: List output files
        run: ls -la glsl_output/

      - name: Upload GLSL artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glsl-sources
          path: glsl_output/
